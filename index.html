<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weekly Challenge</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f2937">
<style>
:root{--bg:#f7f7f7;--card:#fff;--text:#111}
@media (prefers-color-scheme:dark){:root{--bg:#111827;--card:#1f2937;--text:#f3f4f6}}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);max-width:800px;margin:auto;padding:16px}
.card{background:var(--card);padding:16px;border-radius:14px;margin:12px 0}
nav{display:flex;gap:8px;position:sticky;bottom:0;background:var(--bg);padding:8px 0}
button{padding:10px;border-radius:10px}
.tab{display:none}.active{display:block}
input[type=text],select{padding:8px;width:100%}
.small{opacity:.7;font-size:.9em}
</style>
</head>
<body>
<h1>🏆 Weekly Challenge</h1>
<div id="home" class="tab active"></div>
<div id="library" class="tab"></div>
<div id="history" class="tab"></div>
<div id="settings" class="tab"></div>

<nav>
<button onclick="showTab('home')">🏠</button>
<button onclick="showTab('library')">📚</button>
<button onclick="showTab('history')">📈</button>
<button onclick="showTab('settings')">⚙️</button>
</nav>

<script>
const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
let db=JSON.parse(localStorage.getItem("wc_v1")||'{"library":[{"text":"Walk 20 minutes","cat":"Fitness"},{"text":"Practice guitar 15 minutes","cat":"Music"}],"used":[],"history":[]}');

function save(){localStorage.setItem("wc_v1",JSON.stringify(db));}
function mondayKey(){let d=new Date();let day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);d.setHours(0,0,0,0);return d.toISOString().slice(0,10);}

function ensureWeek(){
 let key=mondayKey();
 if(!db.current || db.current.week!==key){
   if(db.current) db.history.unshift(db.current);
   let pool=db.library.filter(c=>!db.used.includes(c.text));
   if(pool.length===0){db.used=[];pool=[...db.library];}
   let c=pool[Math.floor(Math.random()*Math.max(pool.length,1))]||{text:"Add challenges in Library",cat:"General"};
   db.used.push(c.text);
   db.current={week:key,challenge:c.text,cat:c.cat,checks:[0,0,0,0,0,0,0]};
   save();
 }
}
ensureWeek();

function stats(){
 let weeks=[...(db.history||[]),db.current];
 let total=weeks.length*7, done=0, streak=0,best=0;
 weeks.forEach(w=>w.checks.forEach(v=>done+=v?1:0));
 let flat=weeks.flatMap(w=>w.checks);
 for(let v of flat){if(v){streak++;best=Math.max(best,streak)}else streak=0;}
 return {done,total,pct:total?((done/total)*100).toFixed(1):0,best};
}

function render(){
 let s=stats();
 document.getElementById("home").innerHTML=`<div class='card'><h2>${db.current.challenge}</h2><div class='small'>${db.current.cat}</div>
 ${DAYS.map((d,i)=>`<div><input type='checkbox' ${db.current.checks[i]?'checked':''} onchange='toggle(${i},this.checked)'> ${d}</div>`).join("")}
 <p>${db.current.checks.filter(Boolean).length}/7 days</p></div>`;

 document.getElementById("library").innerHTML=`<div class='card'>
 <input id='challenge' placeholder='Challenge text'>
 <input id='cat' placeholder='Category'>
 <button onclick='addChallenge()'>Add Challenge</button>
 <ul>${db.library.map((c,i)=>`<li>${c.text} (${c.cat}) <button onclick='delChallenge(${i})'>Delete</button></li>`).join("")}</ul></div>`;

 document.getElementById("history").innerHTML=`<div class='card'>
 <h3>Success Rate ${s.pct}%</h3>
 <p>Completed ${s.done}/${s.total} days</p>
 <p>Best Streak ${s.best}</p>
 ${db.history.map(h=>`<hr><b>${h.challenge}</b><br>${h.checks.filter(Boolean).length}/7`).join("")}</div>`;

 document.getElementById("settings").innerHTML=`<div class='card'>
 <button onclick='backup()'>Export Backup</button>
 <input type='file' onchange='restore(event)'>
 </div>`;
}
function toggle(i,v){db.current.checks[i]=v;save();render();}
function addChallenge(){let t=challenge.value.trim();if(!t)return;db.library.push({text:t,cat:cat.value||"General"});save();render();}
function delChallenge(i){db.library.splice(i,1);save();render();}
function showTab(id){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');}
function backup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db)],{type:'application/json'}));a.download='weekly-challenge-backup.json';a.click();}
function restore(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{db=JSON.parse(r.result);save();render();};r.readAsText(f);}
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
render();
</script>
</body></html>
